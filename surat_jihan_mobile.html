<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  min-height: 100vh;
  overflow-x: hidden;
}

body {
  background: #ff75aa;
  background-image:
    radial-gradient(circle at 15% 25%, #ffadd0 0%, transparent 45%),
    radial-gradient(circle at 85% 75%, #f0508a 0%, transparent 45%);
  font-family: 'Nunito', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px 32px;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.2) 2.5px, transparent 2.5px);
  background-size: 30px 30px;
  pointer-events: none;
  z-index: 0;
}

.floaty {
  position: fixed;
  pointer-events: none;
  animation: floatUp linear infinite;
  opacity: 0;
  z-index: 0;
  user-select: none;
  will-change: transform;
}
@keyframes floatUp {
  0%   { transform: translateY(105vh) rotate(0deg); opacity: 0.85; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}

/* ── SCENE ENVELOPE ── */
#scene-envelope {
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 2;
  position: relative;
  width: 100%;
  max-width: 340px;
  transition: transform 0.35s ease, opacity 0.35s ease;
}

.page-title {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(24px, 8vw, 38px);
  font-weight: 700;
  color: #fff;
  text-align: center;
  margin-bottom: 20px;
  text-shadow: 0 3px 10px rgba(140,20,60,0.4);
  line-height: 1.3;
}

.envelope-wrapper {
  cursor: pointer;
  width: min(260px, 75vw);
  transition: transform 0.25s ease;
  filter: drop-shadow(0 8px 22px rgba(160,20,70,0.35));
  -webkit-tap-highlight-color: transparent;
}
.envelope-wrapper:hover  { transform: scale(1.05) rotate(-2deg); }
.envelope-wrapper:active { transform: scale(0.93); }
.envelope-wrapper svg { width: 100%; height: auto; display: block; }

.click-hint {
  margin-top: 14px;
  font-size: clamp(13px, 4vw, 16px);
  font-weight: 900;
  color: #fff;
  text-shadow: 0 2px 6px rgba(140,20,60,0.4);
  animation: blink 1.4s ease-in-out infinite;
  text-align: center;
}
@keyframes blink {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.3; }
}

/* ── SCENE REVEAL ── */
#scene-reveal {
  display: none;
  flex-direction: column;
  align-items: center;
  z-index: 2;
  position: relative;
  width: 100%;
  max-width: 340px;
}
#scene-reveal.show {
  display: flex;
  animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes popIn {
  from { transform: scale(0.4) rotate(-6deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg); opacity: 1; }
}

.semangat-text {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(26px, 8.5vw, 40px);
  font-weight: 700;
  color: #fff;
  text-align: center;
  text-shadow: 0 3px 12px rgba(140,20,60,0.4);
  line-height: 1.3;
  margin-bottom: 12px;
}

.sub-text {
  font-size: clamp(13px, 3.8vw, 15px);
  font-weight: 800;
  color: #fff;
  text-align: center;
  text-shadow: 0 2px 6px rgba(140,20,60,0.3);
  margin-bottom: 18px;
  line-height: 1.6;
  padding: 0 4px;
}

.video-wrapper {
  width: min(300px, 88vw);
  aspect-ratio: 1 / 1;
  border-radius: 24px;
  overflow: hidden;
  border: 4px solid #fff;
  box-shadow: 0 8px 32px rgba(160,20,70,0.4);
  background: #ffdaea;
  flex-shrink: 0;
}
.video-wrapper video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.sparkles {
  margin-top: 16px;
  font-size: clamp(18px, 6vw, 26px);
  letter-spacing: 8px;
  animation: sparkle 2s ease-in-out infinite;
}
@keyframes sparkle {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.55; transform: scale(1.1); }
}

/* confetti */
.confetti-burst {
  position: fixed;
  pointer-events: none;
  z-index: 300;
  animation: burst 1.3s ease-out forwards;
}
@keyframes burst {
  0%   { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-130px) scale(0.3) rotate(400deg); opacity: 0; }
}
</style>
</head>
<body>

<!-- SCENE 1 -->
<div id="scene-envelope">
  <div class="page-title">✨ Untuk Jihan<br>Tersayang ✨</div>

  <div class="envelope-wrapper" onclick="openLetter(event)">
    <svg viewBox="0 0 300 210" xmlns="http://www.w3.org/2000/svg">
      <rect x="10" y="46" width="286" height="160" rx="18" fill="rgba(180,30,90,0.15)"/>
      <rect x="6" y="40" width="288" height="162" rx="18" fill="#fff0f7" stroke="#f472b6" stroke-width="3"/>
      <path d="M6,40 L150,125 L294,40 Z" fill="#ffc8e0" stroke="#f472b6" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M6,40 L6,202 L150,128 Z"    fill="#ffdaeb" stroke="#f472b6" stroke-width="1.5"/>
      <path d="M294,40 L294,202 L150,128 Z" fill="#ffe4f0" stroke="#f472b6" stroke-width="1.5"/>
      <path d="M6,202 L150,128 L294,202 Z"  fill="#fff0f7" stroke="#f472b6" stroke-width="1.5"/>
      <path d="M150,93 C150,93 136,79 136,70 C136,64 141,60 146,60 C148,60 150,63 150,63 C150,63 152,60 154,60 C159,60 164,64 164,70 C164,79 150,93 150,93 Z" fill="#ec4899"/>
      <text x="50"  y="85"  font-size="18" fill="#f472b6" opacity="0.8">✦</text>
      <text x="232" y="85"  font-size="18" fill="#f472b6" opacity="0.8">✦</text>
      <text x="30"  y="162" font-size="14" fill="#f9a8d4" opacity="0.7">✿</text>
      <text x="255" y="162" font-size="14" fill="#f9a8d4" opacity="0.7">✿</text>
      <text x="85"  y="188" font-size="12" fill="#f472b6" opacity="0.6">♡</text>
      <text x="200" y="188" font-size="12" fill="#f472b6" opacity="0.6">♡</text>
    </svg>
  </div>

  <div class="click-hint">🌸 Klik surat ini ya! 🌸</div>
</div>

<!-- SCENE 2 -->
<div id="scene-reveal">
  <div class="semangat-text">🌸 Semangat Jihan,<br>kamu pasti bisa! 🌸</div>
  <div class="sub-text">💪 Kamu udah keren banget sejauh ini!<br>Terus semangat ya sayang~ 💖</div>
  <div class="video-wrapper">
    <video id="myVideo" loop playsinline muted>
      <source src="https://cdn.jsdelivr.net/gh/arsyadfr/assetsweb@main/RPReplay_Final1777490710.mp4" type="video/mp4">
    </video>
  </div>
  <div class="sparkles">🌸 💕 🌸 💕 🌸</div>
</div>

<script>
const emojis = ['🌸','💕','✨','🌷','💗','🌺','💖','⭐','🎀'];

function makeFloaty() {
  const el = document.createElement('div');
  el.className = 'floaty';
  el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  el.style.left = Math.random() * 96 + 'vw';
  el.style.animationDuration = (4 + Math.random() * 5) + 's';
  el.style.animationDelay = (Math.random() * 2) + 's';
  el.style.fontSize = (13 + Math.random() * 14) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 10000);
}
setInterval(makeFloaty, 600);
for (let i = 0; i < 6; i++) setTimeout(makeFloaty, i * 200);

function spawnConfetti(x, y) {
  const items = ['💖','🌸','✨','💕','🌷','⭐','🎀'];
  for (let i = 0; i < 16; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-burst';
    el.textContent = items[Math.floor(Math.random() * items.length)];
    el.style.left = (x - 12 + (Math.random() * 120 - 60)) + 'px';
    el.style.top  = (y - 12 + (Math.random() * 40 - 20)) + 'px';
    el.style.animationDelay = (Math.random() * 0.4) + 's';
    el.style.fontSize = (12 + Math.random() * 16) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1800);
  }
}

function openLetter(e) {
  spawnConfetti(e.clientX, e.clientY);

  const envelope = document.getElementById('scene-envelope');
  envelope.style.transform = 'scale(0.4) translateY(-80px)';
  envelope.style.opacity = '0';

  setTimeout(() => {
    envelope.style.display = 'none';
    const reveal = document.getElementById('scene-reveal');
    reveal.classList.add('show');

    const vid = document.getElementById('myVideo');
    vid.muted = false;
    vid.play().catch(() => {
      vid.muted = true;
      vid.play();
    });
  }, 370);
}
</script>
</body>
</html>
